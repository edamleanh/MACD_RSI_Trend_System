# MACD_RSI_Trend_System - Configuration
# ==========================================

data:
  symbol: "VN30F1M"
  source: "VCI"
  interval: "15m"         # Candle chart: 1m, 5m, 15m, 30m, 1H, 1D
  start_date: "2023-01-01"
  end_date: "2025-12-30"

  in_sample:
    start_date: "2023-01-01"
    end_date: "2025-04-09"

  out_sample:
    start_date: "2025-04-09"
    end_date: "2025-12-30"

paper_trading:
  initial_capital: 100000000
  poll_interval_seconds: 60
  state_file: "results/paper_trading/state.json"
  log_file: "results/paper_trading/trades.csv"

results:
  base_directory: "results"

strategy:
  # OPTIMIZED PARAMETERS (Found on 2026-04-18)
  fast: 8
  slow: 53
  signal_period: 15
  ema_trend_period: 38

  # Risk Management
  take_profit: 18
  cut_loss: 5
  use_trailing: true
  trailing_activation: 16
  trailing_step: 14

  # RSI Filters
  rsi_period: 13
  rsi_overbought: 57
  rsi_oversold: 45

  # Trading Fee (per 1 side, in points)
  fee_per_trade: 0.5

optimization:
  n_trials: 300
  min_trades: 30        # Minimum number of trades required for a valid trial

  # Parameter Search Ranges
  fast_range: [5, 20]
  slow_range: [20, 60]
  signal_range: [5, 15]
  ema_trend_range: [30, 200]
  take_profit_range: [5, 20]
  cut_loss_range: [2, 8]
  rsi_period_range: [7, 21]
  rsi_overbought_range: [55, 75]
  rsi_oversold_range: [25, 45]
